services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: topdesign
      POSTGRES_PASSWORD: topdesign
      POSTGRES_DB: topdesign
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run api:dev"
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://topdesign:topdesign@postgres:5432/topdesign
      JWT_SECRET: local-development-secret
      WEB_ORIGIN: http://localhost:3000
    volumes:
      - .:/app
    depends_on:
      - postgres
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev:web"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - .:/app
    depends_on:
      - api
volumes:
  postgres-data:
